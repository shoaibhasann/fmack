<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:white;overflow:hidden">
<canvas id="c" style="display:block"></canvas>
<script>
window.__renderReady = false;
window.__pdf = null;

window.__loadPdf = async function(base64Data) {
  const binary = atob(base64Data);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  window.__pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
  return window.__pdf.numPages;
};

window.__renderPage = async function(pageNum, scale) {
  const pdfPage = await window.__pdf.getPage(pageNum);
  const viewport = pdfPage.getViewport({ scale: scale || 1.5 });
  const canvas = document.getElementById('c');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await pdfPage.render({ canvasContext: ctx, viewport }).promise;
  return canvas.toDataURL('image/png');
};

// Load pdfjs-dist as ESM module
import('/pdfjs/pdf.mjs').then(pdfjsLib => {
  pdfjsLib.GlobalWorkerOptions.workerSrc = '/pdfjs/pdf.worker.mjs';
  window.pdfjsLib = pdfjsLib;
  window.__renderReady = true;
}).catch(err => {
  console.error('pdfjs load failed:', err);
});
</script>
</body>
</html>
