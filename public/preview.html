<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Preview — FMGE / NEET PG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #21253a;
    --border:   #2a2d3e;
    --accent:   #4f8ef7;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #f59e0b;
    --purple:   #7c3aed;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --radius:   10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── Top bar ─────────────────────────────────────────────────────────────── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar h1 { font-size: 15px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  .topbar select, .topbar input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }
  .topbar select:focus, .topbar input:focus { border-color: var(--accent); }

  .topbar .spacer { flex: 1; }

  .q-counter {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .q-counter strong { color: var(--text); }

  /* ── Layout ──────────────────────────────────────────────────────────────── */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ── Question card ───────────────────────────────────────────────────────── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .q-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid transparent;
  }
  .badge-source  { background:#1e293b; color:#94a3b8; border-color:#334155; }
  .badge-subject { background:#1a3040; color:#38bdf8; border-color:#0369a1; }
  .badge-diff-easy   { background:#14532d; color:#86efac; border-color:#16a34a; }
  .badge-diff-medium { background:#451a03; color:#fbbf24; border-color:#d97706; }
  .badge-diff-hard   { background:#450a0a; color:#fca5a5; border-color:#dc2626; }
  .badge-premium { background:#3b1f6e; color:#c084fc; border-color:#7c3aed; }
  .badge-free    { background:#14532d; color:#86efac; border-color:#16a34a; }

  .q-num {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .q-body { padding: 22px 24px; }

  .q-stem {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  /* Question image */
  .q-image {
    width: 100%;
    max-width: 520px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    display: block;
  }

  /* ── Options ─────────────────────────────────────────────────────────────── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    transition: border-color .15s, background .15s;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .option-btn:disabled { cursor: default; }

  .option-btn .opt-label {
    font-weight: 700;
    font-size: 13px;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, color .15s;
  }

  /* Selected (before reveal) */
  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(79, 142, 247, 0.08);
  }
  .option-btn.selected .opt-label {
    background: var(--accent);
    color: #fff;
  }

  /* After reveal */
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(34, 197, 94, 0.08);
  }
  .option-btn.correct .opt-label {
    background: var(--green);
    color: #fff;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(239, 68, 68, 0.08);
  }
  .option-btn.wrong .opt-label {
    background: var(--red);
    color: #fff;
  }

  /* ── Action row ──────────────────────────────────────────────────────────── */
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s;
  }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-ghost    { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }

  /* ── Explanation ─────────────────────────────────────────────────────────── */
  .explanation {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: none;
  }
  .explanation.visible { display: block; }

  .exp-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .exp-text {
    font-size: 14px;
    line-height: 1.75;
    color: #cbd5e1;
    white-space: pre-wrap;
    margin-bottom: 14px;
  }

  /* Explanation tables */
  .exp-tables { display: flex; flex-direction: column; gap: 18px; margin-bottom: 14px; }

  .exp-table-wrap { overflow-x: auto; }

  .exp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 300px;
  }

  .exp-table th {
    background: var(--surface2);
    color: var(--accent);
    padding: 9px 14px;
    text-align: left;
    font-weight: 600;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .exp-table td {
    padding: 8px 14px;
    border: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
    line-height: 1.5;
  }

  .exp-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Explanation images */
  .exp-images {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
  }

  .exp-images img {
    max-width: 100%;
    max-height: 340px;
    border-radius: 8px;
    border: 1px solid var(--border);
    object-fit: contain;
    background: #000;
  }

  /* ── Navigation ──────────────────────────────────────────────────────────── */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 100;
  }

  .nav-btn {
    padding: 8px 22px;
    font-size: 13px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: .35; cursor: default; }

  .nav-info {
    font-size: 13px;
    color: var(--muted);
    min-width: 90px;
    text-align: center;
  }
  .nav-info strong { color: var(--text); }

  /* ── Empty / loading states ──────────────────────────────────────────────── */
  .state-box {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .state-box h3 { font-size: 17px; margin-bottom: 8px; color: var(--text); }
  .state-box p  { font-size: 13px; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result pill ─────────────────────────────────────────────────────────── */
  .result-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .result-pill.correct-result {
    background: rgba(34,197,94,.12);
    color: var(--green);
    border: 1px solid var(--green);
  }
  .result-pill.wrong-result {
    background: rgba(239,68,68,.12);
    color: var(--red);
    border: 1px solid var(--red);
  }
</style>
</head>
<body>

<!-- ── Top filter bar ──────────────────────────────────────────────────────── -->
<div class="topbar">
  <h1>Question Preview</h1>

  <select id="filterSource" onchange="reloadQuestions()">
    <option value="">All Sources</option>
  </select>
  <select id="filterSubject" onchange="reloadQuestions()">
    <option value="">All Subjects</option>
  </select>
  <select id="filterSubscription" onchange="reloadQuestions()">
    <option value="">All Tiers</option>
    <option value="free">Free</option>
    <option value="premium">Premium</option>
    <option value="pro">Pro</option>
  </select>
  <input type="text" id="filterSearch" placeholder="Search stem..." oninput="debounceSearch()" style="width:180px">

  <div class="spacer"></div>
  <div class="q-counter" id="counter">—</div>
</div>

<!-- ── Question area ───────────────────────────────────────────────────────── -->
<div class="page" id="page">
  <div class="state-box">
    <div class="spinner"></div>
    <p>Loading questions…</p>
  </div>
</div>

<!-- ── Navigation bar ─────────────────────────────────────────────────────── -->
<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)" disabled>← Prev</button>
  <div class="nav-info" id="navInfo">—</div>
  <button class="nav-btn" id="nextBtn" onclick="go(+1)" disabled>Next →</button>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  questions:    [],
  idx:          0,       // current index in loaded page
  total:        0,
  page:         1,
  pages:        1,
  answered:     false,
  selected:     null,    // 'a'|'b'|'c'|'d'
  searchTimer:  null,
};

const LIMIT = 50;

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadConfig();
  await loadQuestions(1);
});

// ── loadConfig ─────────────────────────────────────────────────────────────────
async function loadConfig() {
  const data = await api('/api/pyq/sources');

  const srcSel = document.getElementById('filterSource');
  data.sources.forEach(s => {
    const o = document.createElement('option');
    o.value = s.source_code;
    o.textContent = `${s.label || s.source_code}${s.count ? ` (${s.count})` : ''}`;
    srcSel.appendChild(o);
  });

  const subjSel = document.getElementById('filterSubject');
  data.subjects.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    subjSel.appendChild(o);
  });
}

// ── loadQuestions ──────────────────────────────────────────────────────────────
async function loadQuestions(page = 1) {
  state.page     = page;
  state.answered = false;
  state.selected = null;

  const source       = document.getElementById('filterSource').value;
  const subject      = document.getElementById('filterSubject').value;
  const subscription = document.getElementById('filterSubscription').value;
  const search       = document.getElementById('filterSearch').value;

  const params = new URLSearchParams({ page, limit: LIMIT });
  if (source)       params.set('exam_source',       source);
  if (subject)      params.set('subject',            subject);
  if (subscription) params.set('subscription_type', subscription);
  if (search)       params.set('search',             search);

  showLoading();
  const data = await api(`/api/pyq/questions?${params}`);

  state.questions = data.questions || [];
  state.total     = data.total     || 0;
  state.pages     = data.pages     || 1;
  state.idx       = 0;

  updateCounter();

  if (!state.questions.length) {
    document.getElementById('page').innerHTML = `
      <div class="state-box">
        <h3>No questions found</h3>
        <p>Try changing the filters or add questions via the <a href="/admin.html" style="color:var(--accent)">admin page</a>.</p>
      </div>`;
    updateNav();
    return;
  }

  renderQuestion();
}

function reloadQuestions() { loadQuestions(1); }

// ── renderQuestion ─────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = state.questions[state.idx];
  if (!q) return;

  state.answered = false;
  state.selected = null;
  updateNav();
  updateCounter();

  const diffClass = `badge-diff-${q.difficulty || 'medium'}`;

  const page = document.getElementById('page');
  page.innerHTML = `
    <div class="q-card" id="qcard">

      <!-- header badges -->
      <div class="q-header">
        <span class="badge badge-source">${esc(q.exam_source)}</span>
        ${q.exam_type ? `<span class="badge badge-source">${esc(q.exam_type)}</span>` : ''}
        ${q.subject   ? `<span class="badge badge-subject">${esc(q.subject)}</span>` : ''}
        ${q.topic     ? `<span class="badge badge-source">${esc(q.topic)}</span>` : ''}
        <span class="badge ${diffClass}">${q.difficulty || 'medium'}</span>
        ${q.subscription_type && q.subscription_type !== 'free'
          ? `<span class="badge badge-premium">${q.subscription_type}</span>`
          : '<span class="badge badge-free">free</span>'}
        ${q.year    ? `<span class="badge badge-source">${q.year}${q.session ? ' ' + q.session : ''}</span>` : ''}
        <span class="q-num">Q${globalIndex() + 1} of ${state.total}</span>
      </div>

      <div class="q-body">

        <!-- Stem -->
        <div class="q-stem">${esc(q.stem)}</div>

        <!-- Question image (if any) -->
        ${q.question_image_url
          ? `<img class="q-image" src="${q.question_image_url}" alt="Question diagram"
               onerror="this.style.display='none'">`
          : ''}

        <!-- Options -->
        <div class="options" id="options">
          ${['a','b','c','d'].map(opt => `
            <button class="option-btn" data-opt="${opt}"
              onclick="selectOption('${opt}')"
              id="opt-${opt}">
              <span class="opt-label">${opt.toUpperCase()}</span>
              <span>${esc(q['option_' + opt] || '')}</span>
            </button>`).join('')}
        </div>

        <!-- Check / Show answer buttons -->
        <div class="action-row" id="actionRow">
          <button class="btn btn-primary" id="checkBtn"
            onclick="checkAnswer()" disabled>Check Answer</button>
          <button class="btn btn-ghost" onclick="revealAnswer()">Show Answer</button>
        </div>

        <!-- Explanation — hidden until answered -->
        <div class="explanation" id="explanation">
          <div id="resultPill"></div>
          <div class="exp-label">Explanation</div>
          ${q.explanation_text
            ? `<div class="exp-text">${esc(q.explanation_text)}</div>`
            : ''}
          ${renderTables(q.explanation_tables)}
          ${renderExpImages(q.explanation_image_urls)}
        </div>

      </div>
    </div>`;
}

// ── renderTables ───────────────────────────────────────────────────────────────
// Converts the JSONB [{headers:[...], rows:[[...]]}] into real HTML tables.
function renderTables(tables) {
  if (!tables || !tables.length) return '';

  const html = tables.map((t, i) => {
    const hasHeaders = t.headers && t.headers.some(h => h.trim());
    const headerRow  = hasHeaders
      ? `<tr>${t.headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr>`
      : '';
    const dataRows = (t.rows || []).map(row =>
      `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`
    ).join('');

    return `
      <div class="exp-table-wrap">
        <table class="exp-table">
          ${hasHeaders ? `<thead>${headerRow}</thead>` : ''}
          <tbody>${dataRows}</tbody>
        </table>
      </div>`;
  }).join('');

  return `<div class="exp-tables">${html}</div>`;
}

// ── renderExpImages ────────────────────────────────────────────────────────────
function renderExpImages(urls) {
  if (!urls || !urls.length) return '';
  const imgs = urls.map(u =>
    `<img src="${u}" alt="Explanation diagram" onerror="this.style.display='none'">`
  ).join('');
  return `<div class="exp-images">${imgs}</div>`;
}

// ── Option selection ───────────────────────────────────────────────────────────
function selectOption(opt) {
  if (state.answered) return;
  state.selected = opt;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.opt === opt);
  });
  document.getElementById('checkBtn').disabled = false;
}

// ── Check answer ───────────────────────────────────────────────────────────────
function checkAnswer() {
  if (!state.selected || state.answered) return;
  const q      = state.questions[state.idx];
  const correct = q.correct_option.toLowerCase();
  state.answered = true;
  revealResult(correct, state.selected);
}

function revealAnswer() {
  if (state.answered) return;
  const q       = state.questions[state.idx];
  const correct = q.correct_option.toLowerCase();
  state.answered = true;
  state.selected = state.selected || null;
  revealResult(correct, state.selected);
}

function revealResult(correct, selected) {
  // Disable all option buttons
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const opt  = b.dataset.opt;
    b.classList.remove('selected');
    if (opt === correct)                      b.classList.add('correct');
    else if (selected && opt === selected)    b.classList.add('wrong');
  });

  // Result pill
  const pill = document.getElementById('resultPill');
  if (selected) {
    if (selected === correct) {
      pill.innerHTML = `<div class="result-pill correct-result">✓ Correct!</div>`;
    } else {
      pill.innerHTML = `<div class="result-pill wrong-result">✗ Incorrect — Correct answer: ${correct.toUpperCase()}</div>`;
    }
  } else {
    pill.innerHTML = `<div class="result-pill wrong-result" style="border-color:var(--yellow);color:var(--yellow);background:rgba(245,158,11,.1)">Answer: ${correct.toUpperCase()}</div>`;
  }

  // Hide check/show buttons, show explanation
  document.getElementById('actionRow').innerHTML =
    `<button class="btn btn-ghost" onclick="go(+1)">Next Question →</button>`;
  document.getElementById('explanation').classList.add('visible');

  // Scroll explanation into view smoothly
  setTimeout(() => {
    document.getElementById('explanation').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 120);
}

// ── Navigation ─────────────────────────────────────────────────────────────────
async function go(dir) {
  const newIdx = state.idx + dir;

  if (newIdx >= 0 && newIdx < state.questions.length) {
    state.idx = newIdx;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // Need to load a new page of results
  const newPage = state.page + dir;
  if (newPage < 1 || newPage > state.pages) return;

  await loadQuestions(newPage);
  if (dir > 0) state.idx = 0;
  else         state.idx = state.questions.length - 1;

  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNav() {
  const atFirst = state.page === 1 && state.idx === 0;
  const atLast  = state.page === state.pages && state.idx === state.questions.length - 1;
  document.getElementById('prevBtn').disabled = atFirst;
  document.getElementById('nextBtn').disabled = atLast || !state.questions.length;
  document.getElementById('navInfo').innerHTML =
    state.questions.length
      ? `<strong>${globalIndex() + 1}</strong> / ${state.total}`
      : '—';
}

function updateCounter() {
  document.getElementById('counter').innerHTML =
    state.total
      ? `<strong>${state.total}</strong> question${state.total !== 1 ? 's' : ''}`
      : '0 questions';
}

function globalIndex() {
  return (state.page - 1) * LIMIT + state.idx;
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('page').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>`;
}

function debounceSearch() {
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(() => loadQuestions(1), 400);
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function api(url) {
  try {
    const res = await fetch(url);
    return await res.json();
  } catch (e) {
    return {};
  }
}
</script>
</body>
</html>
