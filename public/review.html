<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Question Review — FMGE Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;overflow:hidden}
.topbar{background:#0f3460;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;height:49px}
.topbar h1{font-size:13pt;font-weight:700;white-space:nowrap}
.topbar-right{display:flex;gap:16px;align-items:center}
.topbar a{color:#48cae4;text-decoration:none;font-size:9pt}
.kbd{background:rgba(255,255,255,.15);border-radius:3px;padding:1px 5px;font-size:8pt;font-family:monospace}

.layout{display:grid;grid-template-columns:230px 1fr;height:calc(100vh - 49px);overflow:hidden}

/* ── Sidebar ── */
.sidebar{background:#fff;border-right:1px solid #dee2e6;overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:12px 14px 8px;border-bottom:1px solid #f0f0f0}
.sb-head h3{font-size:9pt;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.summary-row{display:flex;gap:8px;margin-bottom:6px}
.sum-box{flex:1;background:#f8fbff;border-radius:6px;padding:6px 8px;text-align:center}
.sum-box .n{font-size:12pt;font-weight:800;line-height:1}
.sum-box .l{font-size:7.5pt;color:#6c757d;text-transform:uppercase}
.sum-box.kept .n{color:#28a745}
.sum-box.rej .n{color:#dc3545}
.sum-box.pend .n{color:#0f3460}
.prog-bar{height:6px;background:#e9ecef;border-radius:3px;overflow:hidden;margin-bottom:8px}
.prog-kept{height:100%;background:#28a745;float:left;transition:.4s}
.prog-rej{height:100%;background:#dc3545;float:left;transition:.4s}

.sb-list{flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;padding:7px 14px;cursor:pointer;font-size:9.5pt;gap:8px;transition:.12s;border-left:3px solid transparent}
.sb-item:hover{background:#f0f4ff}
.sb-item.active{background:#eef3fc;border-left-color:#0f3460;font-weight:600;color:#0f3460}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.sb-count{font-size:8pt;color:#6c757d;font-weight:500}
.sb-bar{width:40px;height:3px;background:#e9ecef;border-radius:2px}
.sb-bar-fill{height:100%;background:#28a745;border-radius:2px;transition:.4s}
.apply-btn{margin:12px;padding:9px;background:#0f3460;color:#fff;border:none;border-radius:7px;font-size:9.5pt;font-weight:700;cursor:pointer;text-align:center}
.apply-btn:hover{background:#1a4a7a}

/* ── Main ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.toolbar{background:#fff;border-bottom:1px solid #e9ecef;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1}
.toolbar-right{display:flex;align-items:center;gap:6px}
.search-box{padding:6px 11px;border:1.5px solid #dee2e6;border-radius:6px;font-size:9.5pt;width:200px;font-family:inherit}
.search-box:focus{outline:none;border-color:#0f3460}
.page-info{font-size:9pt;color:#6c757d;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:9pt;font-weight:600;transition:.12s;white-space:nowrap}
.btn-primary{background:#0f3460;color:#fff}.btn-primary:hover:not(:disabled){background:#1a4a7a}
.btn-success{background:#28a745;color:#fff}.btn-success:hover:not(:disabled){background:#218838}
.btn-danger{background:#dc3545;color:#fff}.btn-danger:hover:not(:disabled){background:#c82333}
.btn-outline{background:#fff;color:#0f3460;border:1.5px solid #c8d8f0}.btn-outline:hover{background:#f0f4ff}
.btn:disabled{opacity:.4;cursor:not-allowed}

.qscroll{flex:1;overflow-y:auto;padding:14px 18px}

/* ── Question card ── */
.q-card{background:#fff;border-radius:8px;margin-bottom:8px;border:1.5px solid #e9ecef;transition:.12s;cursor:pointer}
.q-card.kept{border-color:#28a745;background:#f6fff8}
.q-card.rejected{border-color:#ffcdd2;background:#fff8f8;opacity:.6}
.q-card.focused{border-color:#0f3460;box-shadow:0 0 0 2px rgba(15,52,96,.1)}
.q-header{display:flex;align-items:flex-start;gap:10px;padding:11px 14px 10px}
.q-num{font-size:8pt;color:#adb5bd;font-weight:700;min-width:28px;padding-top:3px}
.q-stem{flex:1;font-size:10pt;line-height:1.55;color:#1a1a2e}
.q-right{display:flex;align-items:center;gap:6px;padding-left:8px;flex-shrink:0}
.act{width:28px;height:28px;border-radius:5px;border:1.5px solid;cursor:pointer;font-size:11pt;display:flex;align-items:center;justify-content:center;transition:.12s;background:#fff}
.act-k{border-color:#28a745;color:#28a745}.act-k:hover,.act-k.on{background:#28a745;color:#fff}
.act-r{border-color:#dc3545;color:#dc3545}.act-r:hover,.act-r.on{background:#dc3545;color:#fff}
.q-body{padding:0 14px 12px;display:none}
.q-card.open .q-body{display:block}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.opt{padding:6px 10px;border-radius:5px;border:1.5px solid #dee2e6;font-size:9pt;line-height:1.4}
.opt.correct{border-color:#28a745;background:#f0fff4;font-weight:600}
.opt .ok{font-weight:700;color:#0f3460;margin-right:4px}
.expl{background:#f8fbff;border-left:3px solid #0f3460;padding:7px 11px;font-size:9pt;border-radius:0 5px 5px 0;margin-bottom:6px}
.expl ul{padding-left:16px;margin:0}
.expl li{margin-bottom:3px;line-height:1.5;color:#2d3436}
.q-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:2px 7px;border-radius:4px;font-size:7.5pt;font-weight:600}
.chip-s{background:#dbeafe;color:#1e3a8a}
.chip-src{background:#f3e8ff;color:#6b21a8}
.chip-t{background:#f0f4ff;color:#0f3460}

.empty{text-align:center;padding:60px;color:#6c757d;font-size:11pt}
.loading{text-align:center;padding:60px;color:#6c757d}

/* ── Difficulty filter tabs ── */
.diff-tabs{display:flex;gap:4px;align-items:center}
.diff-tab{padding:5px 12px;border-radius:5px;border:1.5px solid #dee2e6;background:#fff;font-size:8.5pt;font-weight:700;cursor:pointer;transition:.12s;color:#6c757d}
.diff-tab:hover{border-color:#0f3460;color:#0f3460}
.diff-tab.active{color:#fff;border-color:transparent}
.diff-tab[data-d="all"].active{background:#0f3460}
.diff-tab[data-d="easy"].active{background:#28a745}
.diff-tab[data-d="medium"].active{background:#fd7e14}
.diff-tab[data-d="hard"].active{background:#dc3545}
.diff-cnt{font-size:7.5pt;font-weight:400;opacity:.8}

/* ── Difficulty badge on card ── */
.d-badge{font-size:7.5pt;font-weight:700;padding:2px 7px;border-radius:4px;cursor:pointer;transition:.12s;border:1.5px solid transparent;white-space:nowrap}
.d-easy{background:#d4edda;color:#155724;border-color:#c3e6cb}
.d-medium{background:#fff3cd;color:#856404;border-color:#ffeeba}
.d-hard{background:#f8d7da;color:#721c24;border-color:#f5c6cb}

/* ── Difficulty inline picker (shown when expanded) ── */
.diff-picker{display:flex;gap:4px;align-items:center}
.diff-picker span{font-size:8.5pt;color:#6c757d;margin-right:4px}
.dp-btn{padding:3px 10px;border-radius:4px;border:1.5px solid;font-size:8pt;font-weight:700;cursor:pointer;background:#fff;transition:.12s}
.dp-easy{border-color:#28a745;color:#28a745}.dp-easy:hover,.dp-easy.on{background:#28a745;color:#fff}
.dp-medium{border-color:#fd7e14;color:#fd7e14}.dp-medium:hover,.dp-medium.on{background:#fd7e14;color:#fff}
.dp-hard{border-color:#dc3545;color:#dc3545}.dp-hard:hover,.dp-hard.on{background:#dc3545;color:#fff}

/* unsaved dot */
.unsaved-dot{width:8px;height:8px;background:#ffc107;border-radius:50%;display:none}
.unsaved-dot.show{display:inline-block}

</style>
</head>
<body>

<div class="topbar">
  <h1>Question Review <span style="font-size:9pt;color:#48cae4;font-weight:400">★ Premium</span></h1>
  <div class="topbar-right">
    <span id="unsavedDot" class="unsaved-dot" title="Unsaved changes"></span>
    <span style="font-size:8.5pt;color:#adb5bd">
      <span class="kbd">K</span> Keep &nbsp;
      <span class="kbd">R</span> Reject &nbsp;
      <span class="kbd">Space</span> Expand &nbsp;
      <span class="kbd">↓↑</span> Move &nbsp;
      <span class="kbd">S</span> Save
    </span>
    <a href="/">Home</a>
    <a href="/pyq.html">PYQ</a>
    <a href="/ingest.html">Ingest</a>
  </div>
</div>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-head">
      <h3>Progress</h3>
      <div class="summary-row">
        <div class="sum-box kept"><div class="n" id="sumKept">0</div><div class="l">Kept</div></div>
        <div class="sum-box rej"><div class="n" id="sumRej">0</div><div class="l">Rejected</div></div>
        <div class="sum-box pend"><div class="n" id="sumPend">—</div><div class="l">Pending</div></div>
      </div>
      <div class="prog-bar">
        <div class="prog-kept" id="pgKept" style="width:0%"></div>
        <div class="prog-rej"  id="pgRej"  style="width:0%"></div>
      </div>
    </div>
    <div class="sb-list" id="sbList">
      <div class="sb-item active" data-s="all" onclick="setSubject('all')">
        <span class="sb-name">All Questions</span>
        <span class="sb-right"><span class="sb-count" id="sbAll">—</span></span>
      </div>
    </div>
    <button class="apply-btn" onclick="applyDecisions()">Apply &amp; Finalize DB</button>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Row 1: difficulty tabs + search -->
    <div class="toolbar" style="gap:8px">
      <div class="diff-tabs">
        <button class="diff-tab active" data-d="all"    onclick="setDifficulty('all')">All <span class="diff-cnt" id="dcAll"></span></button>
        <button class="diff-tab"        data-d="easy"   onclick="setDifficulty('easy')">Easy <span class="diff-cnt" id="dcEasy"></span></button>
        <button class="diff-tab"        data-d="medium" onclick="setDifficulty('medium')">Medium <span class="diff-cnt" id="dcMedium"></span></button>
        <button class="diff-tab"        data-d="hard"   onclick="setDifficulty('hard')">Hard <span class="diff-cnt" id="dcHard"></span></button>
      </div>
      <div style="flex:1"></div>
      <input class="search-box" id="searchBox" placeholder="Search stem…" oninput="debounceSearch()" />
      <span class="page-info" id="pgInfo">—</span>
    </div>
    <!-- Row 2: actions -->
    <div class="toolbar" style="border-top:1px solid #f5f5f5;padding-top:8px">
      <div class="toolbar-left" style="gap:6px">
        <button class="btn btn-outline" onclick="changePage(-1)">← Prev</button>
        <button class="btn btn-outline" onclick="changePage(1)">Next →</button>
        <button class="btn btn-success" onclick="bulkDecide('kept')">✓ Keep Page</button>
        <button class="btn btn-danger"  onclick="bulkDecide('rejected')">✕ Reject Page</button>
        <div style="width:1px;height:20px;background:#dee2e6;margin:0 4px"></div>
        <button class="btn btn-outline" onclick="bulkDifficulty('easy')"   style="border-color:#28a745;color:#28a745">▸ All Easy</button>
        <button class="btn btn-outline" onclick="bulkDifficulty('medium')" style="border-color:#fd7e14;color:#fd7e14">▸ All Medium</button>
        <button class="btn btn-outline" onclick="bulkDifficulty('hard')"   style="border-color:#dc3545;color:#dc3545">▸ All Hard</button>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-primary" id="saveBtn" onclick="saveAll()">💾 Save (S)</button>
      </div>
    </div>

    <div class="qscroll" id="qScroll">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const db       = 'premium';
let subject    = 'all';
let difficulty = 'all';
let search     = '';
let page       = 1;
const LIMIT    = 50;
let totalPages = 1;
let totalQ     = 0;
let summary    = { total: 0, kept: 0, rejected: 0, pending: 0 };
let subjects   = [];
let diffCounts = { easy: 0, medium: 0, hard: 0 };
let currentSlice = [];
let decisions   = {};           // id → 'kept'|'rejected'
let diffChanges = {};           // id → 'easy'|'medium'|'hard' (pending save)
let cardDiffs   = {};           // id → current difficulty for this page's cards
let unsaved    = false;
let focusIdx   = 0;
let searchTimer;

// ── Load page ─────────────────────────────────────────────────────────────────
async function loadPage() {
  document.getElementById('qScroll').innerHTML = '<div class="loading">Loading…</div>';
  try {
    const params = new URLSearchParams({
      page, limit: LIMIT, db,
      ...(subject    !== 'all' ? { subject }    : {}),
      ...(difficulty !== 'all' ? { difficulty } : {}),
      ...(search ? { search } : {})
    });
    const r = await fetch('/api/review/questions?' + params);
    const d = await r.json();

    currentSlice = d.questions || [];
    totalPages   = d.pages     || 1;
    totalQ       = d.total     || 0;
    summary      = d.summary   || summary;
    if (d.subjects?.length)         subjects   = d.subjects;
    if (d.difficulty_counts)        diffCounts = d.difficulty_counts;

    // Seed cardDiffs from server data, override with local diffChanges
    currentSlice.forEach(q => { cardDiffs[q.id] = diffChanges[q.id] || q.difficulty || 'medium'; });

    // Merge server decisions (local takes precedence)
    Object.assign(decisions, d.decisions || {});

    renderSidebar();
    renderDiffTabs();
    renderPage();
    renderProgress();
  } catch(e) {
    document.getElementById('qScroll').innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

// ── Difficulty tabs ───────────────────────────────────────────────────────────
function renderDiffTabs() {
  const total = summary.total || 1;
  document.getElementById('dcAll').textContent    = summary.total.toLocaleString();
  document.getElementById('dcEasy').textContent   = diffCounts.easy.toLocaleString();
  document.getElementById('dcMedium').textContent = diffCounts.medium.toLocaleString();
  document.getElementById('dcHard').textContent   = diffCounts.hard.toLocaleString();
  document.querySelectorAll('.diff-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.d === difficulty);
  });
}

function setDifficulty(d) {
  difficulty = d;
  page       = 1;
  focusIdx   = 0;
  loadPage();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sbAll').textContent = summary.total.toLocaleString();

  // Keep "All" item then rebuild subjects
  const allItem = document.querySelector('.sb-item[data-s="all"]');
  const sbList  = document.getElementById('sbList');
  sbList.innerHTML = '';
  sbList.appendChild(allItem);

  subjects.forEach(({ subject: s, count: c }) => {
    const div = document.createElement('div');
    div.className = 'sb-item' + (subject === s ? ' active' : '');
    div.dataset.s = s;
    div.onclick   = () => setSubject(s);
    div.innerHTML = `
      <span class="sb-name" title="${esc(s)}">${esc(s)}</span>
      <span class="sb-right">
        <span class="sb-count">${c.toLocaleString()}</span>
        <div class="sb-bar"><div class="sb-bar-fill" id="sbf-${esc(s)}" style="width:0%"></div></div>
      </span>`;
    sbList.appendChild(div);
  });

  // Active state
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.dataset.s === subject);
  });
}

function renderProgress() {
  const { total, kept, rejected, pending } = summary;
  document.getElementById('sumKept').textContent = kept.toLocaleString();
  document.getElementById('sumRej').textContent  = rejected.toLocaleString();
  document.getElementById('sumPend').textContent = pending.toLocaleString();
  document.getElementById('pgKept').style.width  = total ? (kept/total*100).toFixed(1)+'%' : '0%';
  document.getElementById('pgRej').style.width   = total ? (rejected/total*100).toFixed(1)+'%' : '0%';
}

function renderPage() {
  document.getElementById('pgInfo').textContent =
    `Page ${page} / ${totalPages} — ${totalQ.toLocaleString()} questions`;

  if (!currentSlice.length) {
    document.getElementById('qScroll').innerHTML = '<div class="empty">No questions match.</div>';
    return;
  }

  const html = currentSlice.map((q, i) => {
    const dec  = decisions[q.id]  || 'pending';
    const diff = cardDiffs[q.id]  || q.difficulty || 'medium';
    const pts  = Array.isArray(q.explanation) ? q.explanation : (q.explanation ? [q.explanation] : []);
    const focused = i === focusIdx;
    return `
    <div class="q-card ${dec==='kept'?'kept':dec==='rejected'?'rejected':''} ${focused?'focused':''}"
         id="qc${i}" data-i="${i}" onclick="handleCardClick(event,${i})">
      <div class="q-header">
        <span class="q-num">${(page-1)*LIMIT+i+1}</span>
        <span class="q-stem">${esc(q.stem||'')}</span>
        <div class="q-right" onclick="event.stopPropagation()">
          <span class="d-badge d-${diff}" onclick="cycleDiff(event,${i})" title="Click to change difficulty">${diff}</span>
          <button class="act act-k ${dec==='kept'?'on':''}"  onclick="decide(${i},'kept')"    title="Keep (K)">✓</button>
          <button class="act act-r ${dec==='rejected'?'on':''}" onclick="decide(${i},'rejected')" title="Reject (R)">✕</button>
        </div>
      </div>
      <div class="q-body">
        <div class="opts">
          ${['a','b','c','d'].map(o=>`
            <div class="opt ${q.correct_option===o?'correct':''}">
              <span class="ok">${o.toUpperCase()}.</span>${esc(q['option_'+o]||'')}
              ${q.correct_option===o?'<span style="color:#28a745;font-size:8pt"> ✓</span>':''}
            </div>`).join('')}
        </div>
        ${pts.length?`<div class="expl"><ul>${pts.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>`:''}
        ${q.gemini_reason?`<div style="background:#fffbeb;border-left:3px solid #ffc107;padding:5px 10px;font-size:8.5pt;border-radius:0 4px 4px 0;margin-bottom:6px;color:#856404"><b>AI:</b> ${esc(q.gemini_reason)}</div>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:6px">
          <div class="q-chips">
            ${q.subject?`<span class="chip chip-s">${esc(q.subject)}</span>`:''}
            ${q.source ?`<span class="chip chip-src">${esc(q.source)}</span>`:''}
            ${q.topic  ?`<span class="chip chip-t">${esc((q.topic||'').slice(0,35))}</span>`:''}
          </div>
          <div class="diff-picker" onclick="event.stopPropagation()">
            <span>Difficulty:</span>
            <button class="dp-btn dp-easy   ${diff==='easy'  ?'on':''}" onclick="setCardDiff(${i},'easy')">Easy</button>
            <button class="dp-btn dp-medium ${diff==='medium'?'on':''}" onclick="setCardDiff(${i},'medium')">Medium</button>
            <button class="dp-btn dp-hard   ${diff==='hard'  ?'on':''}" onclick="setCardDiff(${i},'hard')">Hard</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('qScroll').innerHTML = html;
  // Scroll focused card into view
  const fc = document.getElementById(`qc${focusIdx}`);
  if (fc) fc.scrollIntoView({ block: 'nearest' });
}

function handleCardClick(e, i) {
  focusIdx = i;
  const card = document.getElementById(`qc${i}`);
  if (card) card.classList.toggle('open');
  // re-render only the focused state without full re-render
  document.querySelectorAll('.q-card').forEach((c,ci) => c.classList.toggle('focused', ci===i));
}

// ── Decisions ─────────────────────────────────────────────────────────────────
function decide(i, action) {
  const q = currentSlice[i];
  if (!q) return;
  decisions[q.id] = decisions[q.id] === action ? 'pending' : action;
  markUnsaved();
  // Update summary optimistically
  renderPage();
}

function bulkDecide(action) {
  currentSlice.forEach(q => { decisions[q.id] = action; });
  markUnsaved();
  renderPage();
}

// ── Difficulty change ─────────────────────────────────────────────────────────
function setCardDiff(i, d) {
  const q = currentSlice[i];
  if (!q) return;
  cardDiffs[q.id]   = d;
  diffChanges[q.id] = d;
  markUnsaved();
  renderPage();
}

function cycleDiff(e, i) {
  e.stopPropagation();
  const q    = currentSlice[i];
  if (!q) return;
  const cur  = cardDiffs[q.id] || 'medium';
  const next = { easy: 'medium', medium: 'hard', hard: 'easy' }[cur];
  cardDiffs[q.id]   = next;
  diffChanges[q.id] = next;
  markUnsaved();
  renderPage();
}

function bulkDifficulty(d) {
  currentSlice.forEach(q => { cardDiffs[q.id] = d; diffChanges[q.id] = d; });
  markUnsaved();
  renderPage();
}

function markUnsaved() {
  unsaved = true;
  document.getElementById('unsavedDot').classList.add('show');
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳…';
  try {
    // Save decisions
    const r1 = await fetch('/api/review/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decisions, db })
    });
    const d1 = await r1.json();
    if (!d1.success) throw new Error(d1.error);

    // Save difficulty changes if any
    if (Object.keys(diffChanges).length > 0) {
      const r2 = await fetch('/api/review/difficulty', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ changes: diffChanges, db })
      });
      const d2 = await r2.json();
      if (!d2.success) throw new Error(d2.error);
      diffChanges = {};  // clear after save
    }

    unsaved = false;
    document.getElementById('unsavedDot').classList.remove('show');
    btn.textContent = '✓ Saved';
    summary.kept     = d1.kept;
    summary.rejected = d1.rejected;
    summary.pending  = summary.total - d1.kept - d1.rejected;
    renderProgress();
    setTimeout(() => { btn.textContent = '💾 Save (S)'; btn.disabled = false; }, 1800);
  } catch(err) {
    alert('Save failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = '💾 Save (S)';
  }
}

// Apply finalize
async function applyDecisions() {
  const dbFile  = 'questions_premium.json';
  const kept     = Object.values(decisions).filter(v=>v==='kept').length + summary.kept;
  const rejected = Object.values(decisions).filter(v=>v==='rejected').length + summary.rejected;
  if (!confirm(`Apply review decisions?\n\nThis will:\n• Keep ${kept.toLocaleString()} questions in ${dbFile}\n• Remove ${rejected.toLocaleString()} rejected questions\n• Backup original to questions_pre_review.json\n\nAre you sure?`)) return;
  try {
    const r = await fetch('/api/review/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ db })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    alert(`Done!\nOriginal: ${d.original.toLocaleString()}\nKept: ${d.kept.toLocaleString()}\nRemoved: ${d.removed.toLocaleString()}\nBackup saved as questions_pre_review.json`);
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function changePage(dir) {
  const np = page + dir;
  if (np < 1 || np > totalPages) return;
  page     = np;
  focusIdx = 0;
  loadPage();
  document.getElementById('qScroll').scrollTo(0,0);
}

function setSubject(s) {
  subject  = s;
  page     = 1;
  focusIdx = 0;
  search   = '';
  document.getElementById('searchBox').value = '';
  loadPage();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    search   = document.getElementById('searchBox').value;
    page     = 1;
    focusIdx = 0;
    loadPage();
  }, 400);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.ctrlKey || e.metaKey) return;

  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    if (focusIdx < currentSlice.length - 1) { focusIdx++; renderPage(); }
    else changePage(1);
  } else if (e.key === 'ArrowUp' || e.key === 'i') {
    e.preventDefault();
    if (focusIdx > 0) { focusIdx--; renderPage(); }
    else changePage(-1);
  } else if (e.key === ' ') {
    e.preventDefault();
    const card = document.getElementById(`qc${focusIdx}`);
    if (card) { card.classList.toggle('open'); document.querySelectorAll('.q-card').forEach((c,ci)=>c.classList.toggle('focused',ci===focusIdx)); }
  } else if (e.key === 'k') {
    decide(focusIdx, 'kept');
  } else if (e.key === 'r') {
    decide(focusIdx, 'rejected');
  } else if (e.key === 's') {
    saveAll();
  } else if (e.key === 'ArrowRight') {
    changePage(1);
  } else if (e.key === 'ArrowLeft') {
    changePage(-1);
  }
});

window.addEventListener('beforeunload', e => { if (unsaved) { e.preventDefault(); e.returnValue=''; } });

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadPage();
</script>
